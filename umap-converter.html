<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMAP Converter</title>
    <script>
        // The React bundle uses basename="/umap-to-uefn-converter"
        // Rewrite the URL so React Router is satisfied before the bundle boots
        var path = window.location.pathname;
        if (!path.includes('/umap-to-uefn-converter')) {
            var newPath = path.replace(/\/umap-converter\.html$/, '') + '/umap-to-uefn-converter';
            window.history.replaceState(null, '', newPath);
        }
    </script>
</head>
