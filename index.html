<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UEFN Ultimate Toolkit</title>
  <style>
    :root { --accent: #00d4ff; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0f;
      color: #e0e0ff;
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 1100px; margin: 0 auto; }
    header {
      background: rgba(15,15,25,0.95);
      border-radius: 12px;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border: 1px solid rgba(0,212,255,0.2);
    }
    .stats { font-size: 1.35rem; font-weight: 600; }
    .stats span { color: var(--accent); }

    .tabs { display: flex; background: #111118; border-radius: 8px; padding: 6px; margin-bottom: 25px; width: fit-content; }
    .tab { padding: 12px 28px; background: transparent; border: none; color: #aaa; font-size: 1.05rem; border-radius: 6px; cursor: pointer; }
    .tab.active { background: linear-gradient(90deg, #00d4ff, #0099ff); color: black; font-weight: bold; }

    .main-card {
      background: #12121a;
      border-radius: 16px;
      padding: 35px;
      border: 1px solid rgba(0,212,255,0.15);
      box-shadow: 0 0 40px rgba(0,212,255,0.1);
    }

    .upload-area {
      border: 2px dashed #334455;
      border-radius: 12px;
      padding: 50px 20px;
      margin: 20px 0;
      text-align: center;
      transition: all 0.3s;
    }
    .upload-area:hover { border-color: var(--accent); background: rgba(0,212,255,0.05); }

    button {
      padding: 14px 32px;
      font-size: 1.1rem;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .upload-btn { background: linear-gradient(90deg, #00d4ff, #0099ff); color: black; }
    .convert-btn { background: linear-gradient(90deg, #00b0ff, #0066ff); color: white; width: 100%; padding: 18px; font-size: 1.3rem; margin-top: 15px; }

    textarea {
      width: 100%;
      background: #1a1a22;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 15px;
      color: #ddd;
      font-family: monospace;
      min-height: 200px;
      resize: vertical;
    }
    .hidden { display: none; }
    .filename { color: #00ffaa; font-size: 1.1rem; margin: 10px 0; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="stats">You have converted a total of <span id="count">254</span> files!</div>
      <button onclick="showSettings()" style="background:#1f1f2e; color:#aaa; padding:8px 16px;">⚙️ Settings</button>
    </header>

    <div class="tabs">
      <button class="tab active" data-tab="converter">Converter</button>
      <button class="tab" data-tab="missing">Missing Assets</button>
      <button class="tab" data-tab="collision">Collision Converter</button>
    </div>

    <!-- CONVERTER -->
    <div id="converter" class="main-card">
      <h2>UMAP to UEFN Converter</h2>
      <p style="color:#aaa; margin:20px 0;">Best full-featured converter (terrain + recreated models)</p>
      <a href="https://senseiusagi.github.io/umap-to-uefn-converter/" target="_blank">
        <button class="convert-btn">🚀 OPEN FULL CONVERTER</button>
      </a>
    </div>

    <!-- MISSING ASSETS -->
    <div id="missing" class="main-card hidden">
      <h2>Missing Assets Check</h2>
      <textarea id="beforeBox" rows="7" placeholder="Paste BEFORE (original) text..."></textarea>
      <textarea id="afterBox" rows="7" placeholder="Paste AFTER (converted) text..."></textarea>
      <button onclick="document.getElementById('rulesFile').click()" style="background:#333;">📂 Load Ruleset (JSON)</button>
      <input type="file" id="rulesFile" hidden accept=".json">
      <button class="convert-btn" onclick="compareAssets()">🔍 Check for Missing Assets</button>
      <textarea id="missingOutput" rows="12" readonly></textarea>
      <button onclick="copyMissing()" style="background:#00d4ff; color:black; width:100%;">📋 Copy Results</button>
    </div>

    <!-- COLLISION CONVERTER (FIXED) -->
    <div id="collision" class="main-card hidden">
      <h2>Collision Converter (FModel → UEFN)</h2>
      <div class="upload-area" id="collisionDrop">
        <p id="collisionFilename" style="margin-bottom:10px;">No file selected</p>
        <button class="upload-btn" onclick="document.getElementById('collisionFile').click()">↑ Upload .json file</button>
        <input type="file" id="collisionFile" accept=".json" hidden>
      </div>
      <button class="convert-btn" onclick="convertCollision()">CONVERT COLLISION</button>
      <textarea id="collisionOutput" readonly style="margin-top:20px; min-height:280px;"></textarea>
      <button onclick="copyCollision()" style="background:#00d4ff; color:black; width:100%; margin-top:10px;">📋 Copy to Clipboard</button>
    </div>
  </div>

  <script>
    // Tab System
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('.main-card').forEach(c => c.classList.add('hidden'));
        document.getElementById(tab.dataset.tab).classList.remove('hidden');
      });
    });

    let count = 254;
    try { count = parseInt(localStorage.getItem('uefnCount')) || 254; } catch(e){}
    document.getElementById('count').textContent = count;

    function incrementCount() {
      count++;
      document.getElementById('count').textContent = count;
      try { localStorage.setItem('uefnCount', count); } catch(e){}
    }

    // ==================== COLLISION CONVERTER (FULL & IMPROVED) ====================
    let currentCollisionFileName = "";

    document.getElementById('collisionFile').addEventListener('change', e => {
      const file = e.target.files[0];
      if (file) {
        currentCollisionFileName = file.name;
        document.getElementById('collisionFilename').textContent = "Selected: " + file.name;
      }
    });

    function convertCollision() {
      const file = document.getElementById('collisionFile').files[0];
      if (!file) return alert("Please upload a JSON file first.");

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const json = JSON.parse(e.target.result);
          let convexOutput = "";
          let boxOutput = "";

          json.forEach(entry => {
            if (!entry?.Properties?.AggGeom) return;
            const geom = entry.Properties.AggGeom;

            // ConvexElems
            if (geom.ConvexElems && geom.ConvexElems.length > 0) {
              const convexList = geom.ConvexElems.map(elem => {
                const verts = elem.VertexData.map(v => `(X=${v.X},Y=${v.Y},Z=${v.Z})`).join(",");
                const indices = elem.IndexData.join(",");
                const box = `ElemBox=(Min=(X=${elem.ElemBox.Min.X},Y=${elem.ElemBox.Min.Y},Z=${elem.ElemBox.Min.Z}),Max=(X=${elem.ElemBox.Max.X},Y=${elem.ElemBox.Max.Y},Z=${elem.ElemBox.Max.Z}),IsValid=True)`;
                return `(VertexData=(${verts}),IndexData=(${indices}),${box})`;
              });
              convexOutput = `ConvexElems=(${convexList.join(",")})`;
            }

            // BoxElems
            if (geom.BoxElems && geom.BoxElems.length > 0) {
              const boxList = geom.BoxElems.map(elem => {
                const c = elem.Center || {X:0,Y:0,Z:0};
                const r = elem.Rotation || {Pitch:0,Yaw:0,Roll:0};
                return `(Center=(X=${c.X},Y=${c.Y},Z=${c.Z}),Rotation=(Pitch=${r.Pitch},Yaw=${r.Yaw},Roll=${r.Roll}),X=${elem.X||100},Y=${elem.Y||100},Z=${elem.Z||100})`;
              });
              boxOutput = `BoxElems=(${boxList.join(",")})`;
            }
          });

          const finalOutput = `(${boxOutput || "BoxElems="},${convexOutput || "ConvexElems="})`;
          
          document.getElementById('collisionOutput').value = finalOutput;
          incrementCount();
        } catch (err) {
          alert("Error parsing JSON. Make sure it's a valid FModel collision export.");
        }
      };
      reader.readAsText(file);
    }

    function copyCollision() {
      const text = document.getElementById('collisionOutput').value;
      if (text) navigator.clipboard.writeText(text);
    }

    // ==================== MISSING ASSETS ====================
    let exclusionSet = new Set();

    function canonicalizeAsset(raw) {
      if (!raw) return raw;
      let s = raw.replace(/^['"]+|['",\)\;]+$/g, "").trim();
      if (!s.includes(".")) return s;
      const firstDot = s.indexOf(".");
      const main = s.substring(0, firstDot);
      const rest = s.substring(firstDot + 1);
      if (/^\d+$/.test(rest)) return main;
      const secondClean = rest.split(".")[0].replace(/^Default__/, "").replace(/_C$/, "");
      return secondClean ? `${main}.${secondClean}` : main;
    }

    function findAllMatches(text) {
      return [...text.matchAll(/\/Game\/[^\s"']+/g)].map(m => canonicalizeAsset(m[0]));
    }

    function compareAssets() {
      const before = document.getElementById('beforeBox').value || "";
      const after = document.getElementById('afterBox').value || "";
      if (!before || !after) return alert("Please paste both BEFORE and AFTER text.");

      const beforeSet = new Set(findAllMatches(before));
      const afterSet = new Set(findAllMatches(after));
      const missing = [...beforeSet].filter(x => !afterSet.has(x) && !exclusionSet.has(x));

      document.getElementById('missingOutput').value = missing.length ? missing.join('\n') : "No missing assets found!";
      incrementCount();
    }

    document.getElementById('rulesFile').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const rules = JSON.parse(ev.target.result);
          exclusionSet = new Set(rules.map(r => canonicalizeAsset(r.old)).filter(Boolean));
          alert(`Ruleset loaded! ${exclusionSet.size} exclusions applied.`);
        } catch(err) { alert("Invalid rules JSON."); }
      };
      reader.readAsText(file);
    });

    function copyMissing() {
      navigator.clipboard.writeText(document.getElementById('missingOutput').value || "");
    }

    // Settings
    function showSettings() { alert("Settings panel coming soon!\n\nReset counter is available in future updates."); }
  </script>
</body>
</html>
