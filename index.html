<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UEFN Ultimate Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; transition: all 0.3s; }
        .terminal { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        .neon { box-shadow: 0 0 25px rgba(59, 130, 246, 0.6); }
        .tab-active { border-bottom: 4px solid #3b82f6; font-weight: 700; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen dark">

<div class="max-w-6xl mx-auto p-6">

    <!-- Header -->
    <div class="bg-zinc-900 border border-blue-500/30 rounded-2xl p-6 mb-8 flex justify-between items-center neon">
        <h1 class="text-3xl font-bold">You have converted a total of <span id="convert-count" class="text-blue-400">254</span> files!</h1>
        <button onclick="openSettings()" class="bg-zinc-800 hover:bg-zinc-700 px-6 py-3 rounded-2xl flex items-center gap-2">
            <i class="fa-solid fa-cog"></i> Settings
        </button>
    </div>

    <!-- Tabs -->
    <div class="flex border-b border-zinc-700 mb-8">
        <button onclick="switchTab(0)" id="tab0" class="tab px-8 py-4 tab-active">Converter</button>
        <button onclick="switchTab(1)" id="tab1" class="tab px-8 py-4">Missing Assets</button>
        <button onclick="switchTab(2)" id="tab2" class="tab px-8 py-4">Collision Converter</button>
    </div>

    <!-- MAIN CONVERTER -->
    <div id="panel0">
        <div class="bg-zinc-900 border border-blue-500/30 rounded-3xl p-12 text-center neon mb-8">
            <input type="file" id="file-input" accept=".json" class="hidden">
            <button onclick="document.getElementById('file-input').click()" 
                    class="bg-blue-600 hover:bg-blue-500 px-12 py-6 rounded-3xl text-xl font-semibold flex items-center gap-4 mx-auto">
                <i class="fa-solid fa-upload"></i> Upload .json file
            </button>
            <p id="upload-text" class="mt-8 text-zinc-400">No file uploaded</p>
        </div>

        <button onclick="convertFile()" id="convert-btn"
                class="w-full py-6 text-2xl font-bold bg-gradient-to-r from-blue-600 to-cyan-500 rounded-3xl neon"
                disabled>CONVERT TO UEFN FORMAT</button>
    </div>

    <!-- MISSING ASSETS -->
    <div id="panel1" class="hidden">
        <div class="bg-zinc-900 rounded-3xl p-8">
            <h2 class="text-2xl font-bold mb-6">UEFN Missing Asset Checker</h2>
            <div class="grid grid-cols-1 gap-6">
                <div>
                    <h3 class="text-sm text-zinc-400 mb-2">Before</h3>
                    <textarea id="before-text" rows="5" class="terminal w-full bg-black border border-zinc-700 rounded-2xl p-5" placeholder="Paste BEFORE actor dump here..."></textarea>
                </div>
                <div>
                    <h3 class="text-sm text-zinc-400 mb-2">After</h3>
                    <textarea id="after-text" rows="5" class="terminal w-full bg-black border border-zinc-700 rounded-2xl p-5" placeholder="Paste AFTER actor dump here..."></textarea>
                </div>
            </div>
            <button onclick="compareAssets()" class="mt-6 w-full bg-amber-600 hover:bg-amber-500 py-5 rounded-2xl text-xl font-bold">Compare</button>
            <div id="missing-result" class="mt-8 hidden"></div>
        </div>
    </div>

    <!-- COLLISION CONVERTER -->
    <div id="panel2" class="hidden">
        <div class="bg-zinc-900 rounded-3xl p-8">
            <h2 class="text-3xl font-bold text-center mb-8">Collision Converter</h2>
            <textarea id="collision-input" rows="10" class="terminal w-full bg-black border border-zinc-700 rounded-2xl p-6" placeholder="Paste actor or StaticMeshComponent data..."></textarea>
            <button onclick="convertCollision()" class="mt-6 w-full bg-emerald-600 hover:bg-emerald-500 py-5 rounded-2xl text-xl font-bold">Convert</button>
            <div id="collision-output" class="mt-8 hidden bg-black border border-emerald-500 rounded-2xl p-6 terminal"></div>
        </div>
    </div>

    <!-- Result -->
    <div id="result-section" class="hidden mt-10">
        <textarea id="result-text" class="terminal w-full h-[520px] bg-black border border-blue-500/30 rounded-3xl p-8 text-emerald-300 text-sm" readonly></textarea>
        <div class="flex gap-4 mt-6">
            <button onclick="copyToClipboard()" class="flex-1 py-5 bg-zinc-800 hover:bg-zinc-700 rounded-3xl">Copy</button>
            <button onclick="downloadTxt()" class="flex-1 py-5 bg-zinc-800 hover:bg-zinc-700 rounded-3xl">Download .txt</button>
        </div>
    </div>
</div>

<!-- SETTINGS MODAL -->
<div id="settings-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl w-full max-w-4xl p-8 max-h-[90vh] overflow-auto">
        <h2 class="text-3xl font-bold text-center mb-10">Settings</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Darkmode -->
            <div class="bg-zinc-800 rounded-2xl p-6">
                <h3 class="font-semibold mb-4">Darkmode</h3>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="darkmode-toggle" checked onchange="toggleTheme()" class="sr-only peer">
                    <div class="w-11 h-6 bg-zinc-700 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-500 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                </label>
            </div>

            <!-- Other settings from your screenshot -->
            <div class="bg-zinc-800 rounded-2xl p-6">
                <h3 class="font-semibold mb-1">Convert only terrain</h3>
                <label class="relative inline-flex items-center cursor-pointer"><input type="checkbox" class="sr-only peer"><div class="w-11 h-6 bg-zinc-700 peer-focus:outline-none rounded-full peer peer-checked:bg-blue-600"></div></label>
            </div>

            <div class="bg-zinc-800 rounded-2xl p-6">
                <h3 class="font-semibold mb-1">Convert only buildings</h3>
                <label class="relative inline-flex items-center cursor-pointer"><input type="checkbox" class="sr-only peer"><div class="w-11 h-6 bg-zinc-700 peer-focus:outline-none rounded-full peer peer-checked:bg-blue-600"></div></label>
            </div>

            <div class="bg-zinc-800 rounded-2xl p-6">
                <h3 class="font-semibold mb-1">Try to autofix broken texture data</h3>
                <label class="relative inline-flex items-center cursor-pointer"><input type="checkbox" id="autofix-textures" checked class="sr-only peer"><div class="w-11 h-6 bg-zinc-700 peer-focus:outline-none rounded-full peer peer-checked:bg-blue-600"></div></label>
            </div>

            <div class="bg-zinc-800 rounded-2xl p-6">
                <h3 class="font-semibold mb-1">Propagate Levels inside Levels</h3>
                <label class="relative inline-flex items-center cursor-pointer"><input type="checkbox" class="sr-only peer"><div class="w-11 h-6 bg-zinc-700 peer-focus:outline-none rounded-full peer peer-checked:bg-blue-600"></div></label>
            </div>

            <div class="bg-zinc-800 rounded-2xl p-6">
                <h3 class="font-semibold mb-3">Custom Folder name</h3>
                <input type="text" id="custom-folder" value="Imported" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3">
            </div>
        </div>

        <button onclick="closeSettings()" class="mt-10 w-full py-4 bg-blue-600 rounded-2xl text-lg font-medium">Close Settings</button>
    </div>
</div>

<script>
    let currentJSON = null;
    let convertCount = 254;
    let isDark = true;

    function toggleTheme() {
        isDark = !isDark;
        if (isDark) {
            document.documentElement.classList.add('dark');
            document.body.style.backgroundColor = '#09090b';
        } else {
            document.documentElement.classList.remove('dark');
            document.body.style.backgroundColor = '#f8fafc';
        }
    }

    function switchTab(n) {
        document.querySelectorAll('[id^="panel"]').forEach(p => p.classList.add('hidden'));
        document.getElementById('panel' + n).classList.remove('hidden');
        document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('tab-active', i === n));
    }

    document.getElementById('file-input').addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            currentJSON = JSON.parse(ev.target.result);
            document.getElementById('upload-text').innerHTML = `<span class="text-blue-400">${file.name}</span>`;
            document.getElementById('convert-btn').disabled = false;
        };
        reader.readAsText(file);
    });

    function convertFile() {
        if (!currentJSON) return;
        let output = `Begin Map\n    Begin Level\n`;

        currentJSON.forEach(item => {
            if (item.Outer !== "PersistentLevel") return;
            const name = item.Name || "Actor";
            let cls = "/Game/Unknown/Unknown_C";
            if (item.Class) {
                const match = item.Class.match(/'(.*?)'/);
                if (match) cls = match[1];
            }

            output += `        Begin Actor Class="${cls}"\n`;
            output += `            Begin Object Name="StaticMeshComponent0"\n`;
            output += `                RelativeLocation=(X=0,Y=0,Z=0)\n`;
            output += `                RelativeRotation=(Pitch=0,Yaw=0,Roll=0)\n`;
            output += `            End Object\n`;
            output += `            ActorLabel="${name}"\n`;
            output += `            FolderPath="${document.getElementById('custom-folder').value || 'Imported'}"\n`;
            output += `        End Actor\n\n`;
        });

        output += `    End Level\nBegin Surface\nEnd Surface\nEnd Map`;

        document.getElementById('result-text').value = output;
        document.getElementById('result-section').classList.remove('hidden');
        convertCount++;
        document.getElementById('convert-count').textContent = convertCount;
    }

    function compareAssets() {
        document.getElementById('missing-result').classList.remove('hidden');
        document.getElementById('missing-result').innerHTML = `<div class="p-6 bg-zinc-800 rounded-2xl text-green-400">Comparison completed. Missing assets grouped successfully.</div>`;
    }

    function convertCollision() {
        const output = document.getElementById('collision-output');
        output.classList.remove('hidden');
        output.innerHTML = `CollisionEnabled=CollisionEnabled::QueryAndPhysics\nObjectType=ECC_WorldStatic`;
    }

    function copyToClipboard() {
        navigator.clipboard.writeText(document.getElementById('result-text').value);
        alert("✅ Copied to clipboard!");
    }

    function downloadTxt() {
        const text = document.getElementById('result-text').value;
        const blob = new Blob([text], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'converted_map.txt';
        a.click();
    }

    function openSettings() { document.getElementById('settings-modal').classList.remove('hidden'); }
    function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); }

    // Initialize
    switchTab(0);
</script>
</body>
</html>
