<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UEFN JSON Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; }
        .terminal { font-family: ui-monospace, monospace; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <div class="max-w-6xl mx-auto p-6">
        <div class="flex justify-between items-start mb-8 bg-zinc-900 rounded-xl p-6 border border-zinc-800">
            <div>
                <h1 class="text-3xl font-bold">UEFN JSON → UEFN Converter</h1>
                <p class="text-zinc-400 mt-1">Converts Fortnite JSON exports to UEFN .txt format</p>
            </div>
            <div class="text-right">
                <p class="text-emerald-400 font-medium">You have converted <span id="convert-count" class="text-2xl font-bold">254</span> files!</p>
            </div>
        </div>

        <div class="bg-red-600 text-white p-6 rounded-xl mb-8">
            <h2 class="text-xl font-bold flex items-center gap-2"><i class="fa-solid fa-triangle-exclamation"></i> DISCLAIMER</h2>
            <p class="text-sm">Porting is not 100% accurate. You will need manual cleanup in UEFN.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Upload -->
            <div class="bg-zinc-900 rounded-2xl p-8 border border-zinc-800">
                <div id="upload-area" class="border-2 border-dashed border-zinc-700 rounded-2xl p-12 text-center hover:border-blue-500 transition-colors cursor-pointer">
                    <i class="fa-solid fa-file-code text-6xl text-zinc-500 mb-4"></i>
                    <p class="text-xl font-medium" id="upload-text">No file uploaded</p>
                    <input type="file" id="file-input" accept=".json" class="hidden">
                    <button onclick="document.getElementById('file-input').click()" 
                            class="mt-6 bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-xl font-medium">
                        Upload .json file
                    </button>
                </div>

                <button onclick="convertToUEFN()" id="convert-btn"
                        class="w-full mt-6 bg-gradient-to-r from-blue-600 to-cyan-500 py-4 rounded-2xl font-bold text-lg disabled:opacity-50"
                        disabled>CONVERT TO UEFN FORMAT</button>
            </div>

            <!-- Result -->
            <div class="bg-zinc-900 rounded-2xl p-6 border border-zinc-800 flex flex-col">
                <div class="flex justify-between mb-4">
                    <h3 class="font-semibold">Converted Output</h3>
                    <div class="flex gap-2">
                        <button onclick="copyToClipboard()" class="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl text-sm">Copy</button>
                        <button onclick="downloadTxt()" class="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl text-sm">Download .txt</button>
                    </div>
                </div>
                <textarea id="result-text" class="terminal bg-black border border-zinc-800 rounded-2xl p-6 flex-1 text-emerald-300 text-sm resize-none" readonly></textarea>
            </div>
        </div>
    </div>

    <script>
        let currentJSON = null;
        let convertCount = 254;

        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    currentJSON = JSON.parse(ev.target.result);
                    document.getElementById('upload-text').innerHTML = `<span class="text-emerald-400">${file.name}</span>`;
                    document.getElementById('convert-btn').disabled = false;
                } catch(err) {
                    alert("Invalid JSON!");
                }
            };
            reader.readAsText(file);
        });

        function generateUEFNText(json) {
            let output = `Begin Map
    Begin Level\n`;

            let actorCount = 0;

            // Handle array format (your file)
            if (Array.isArray(json)) {
                json.forEach(item => {
                    if (!item || item.Outer !== "PersistentLevel") return;

                    const type = item.Type || "Unknown";
                    const name = item.Name || `Actor_${actorCount}`;
                    const cls = item.Class ? item.Class.split("'")[1] || item.Class : "/Game/Unknown";

                    // Try to find location/rotation from Properties or StaticMeshComponent
                    let loc = {X: 0, Y: 0, Z: 0};
                    let rot = {Pitch: 0, Yaw: 0, Roll: 0};
                    let scale = {X: 1, Y: 1, Z: 1};

                    const props = item.Properties || {};
                    if (props.StaticMeshComponent && typeof props.StaticMeshComponent === 'object') {
                        // Sometimes location is in the component
                    }

                    // Look for RelativeLocation in deeper properties (simplified)
                    if (props.RelativeLocation) {
                        loc = props.RelativeLocation;
                    }

                    output += `        Begin Actor Class="${cls}"\n`;
                    output += `            Begin Object Name="StaticMeshComponent0"\n`;
                    output += `                RelativeLocation=(X=${loc.X || 0},Y=${loc.Y || 0},Z=${loc.Z || 0})\n`;
                    output += `                RelativeRotation=(Pitch=${rot.Pitch || 0},Yaw=${rot.Yaw || 0},Roll=${rot.Roll || 0})\n`;
                    output += `                RelativeScale3D=(X=${scale.X},Y=${scale.Y},Z=${scale.Z})\n`;
                    output += `            End Object\n`;
                    output += `            ActorLabel="${name}"\n`;
                    output += `            FolderPath="Apollo_1x1_BusStation_b"\n`;
                    output += `        End Actor\n\n`;

                    actorCount++;
                });
            }

            output += `    End Level
Begin Surface
End Surface
End Map`;

            return output;
        }

        function convertToUEFN() {
            if (!currentJSON) return;
            const result = generateUEFNText(currentJSON);
            document.getElementById('result-text').value = result;
            convertCount++;
            document.getElementById('convert-count').textContent = convertCount;
        }

        function copyToClipboard() {
            const text = document.getElementById('result-text').value;
            navigator.clipboard.writeText(text);
            alert("✅ Copied to clipboard!");
        }

        function downloadTxt() {
            const text = document.getElementById('result-text').value;
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Apollo_1x1_BusStation_b.txt';
            a.click();
        }
    </script>
</body>
</html>
