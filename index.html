<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unreal Multi-Tool - All In One</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin:0; background:#1e1e1e; color:#ddd; }
        h1 { text-align:center; color:#4fc3f7; padding:20px; margin:0; background:#252526; }
        .tabs { display:flex; background:#252526; border-bottom:3px solid #333; }
        .tab-button {
            padding:16px 24px; background:transparent; border:none; color:#aaa; font-size:16px; cursor:pointer;
        }
        .tab-button.active { background:#1e1e1e; color:#4fc3f7; border-bottom:4px solid #4fc3f7; }
        .tab-content { display:none; padding:20px; background:#1e1e1e; }
        .tab-content.active { display:block; }
        textarea { width:100%; background:#252526; color:#ddd; border:1px solid #555; border-radius:4px; padding:12px; font-family:Consolas,monospace; box-sizing:border-box; }
        button { background:#0e70c0; color:white; border:none; padding:12px 20px; margin:5px; border-radius:4px; cursor:pointer; }
        button:hover { background:#1087e0; }
        .instructions { background:#333; padding:15px; border-radius:6px; margin-bottom:15px; }

        /* UMAP tab */
        #tab2 { padding: 0; }
        #umap-frame {
            width: 100%;
            height: calc(100vh - 120px);
            min-height: 600px;
            border: none;
            display: block;
            background: #1e1e1e;
        }
    </style>
</head>
<body>
    <h1>Unreal Engine Multi-Tool (All In One)</h1>

    <div class="tabs">
        <button class="tab-button active" onclick="switchTab(0)">Asset Diff</button>
        <button class="tab-button" onclick="switchTab(1)">Collision Converter</button>
        <button class="tab-button" onclick="switchTab(2)">UMAP Converter</button>
    </div>

    <!-- Tab 1: Asset Diff -->
    <div id="tab0" class="tab-content active">
        <div class="instructions"><strong>Asset Diff Tool</strong> — Compare Before &amp; After level exports</div>
        <div style="display:flex; gap:20px;">
            <div style="flex:1;">
                <h3>Before</h3>
                <textarea id="beforeBox" rows="16" placeholder="Paste BEFORE level text..."></textarea>
            </div>
            <div style="flex:1;">
                <h3>After</h3>
                <textarea id="afterBox" rows="16" placeholder="Paste AFTER level text..."></textarea>
            </div>
        </div>
        <div style="margin:15px 0;">
            <input type="file" id="rulesFile" accept=".json">
            <button id="compareButton">Compare</button>
            <button onclick="copyField('outputBox')">Copy Result</button>
        </div>
        <h3>Result</h3>
        <textarea id="outputBox" rows="12" readonly></textarea>
    </div>

    <!-- Tab 2: Collision Converter -->
    <div id="tab1" class="tab-content">
        <div class="instructions"><strong>Collision Converter</strong> — FModel AggGeom JSON to Unreal format</div>
        <input type="file" id="fileInput" accept=".json"><br><br>
        <button id="convertButton">Convert Collision</button>
        <button id="copyCollisionBtn">Copy Output</button>
        <h3>Output</h3>
        <textarea id="collisionOutput" rows="18" readonly></textarea>
    </div>

    <!-- Tab 3: UMAP Converter (iframe, lazy-loaded) -->
    <div id="tab2" class="tab-content">
        <iframe id="umap-frame" title="UMAP to UEFN Converter"></iframe>
    </div>

    <script>
        // Tab System
        let umapLoaded = false;

        function switchTab(n) {
            document.querySelectorAll('.tab-button').forEach((b, i) => b.classList.toggle('active', i === n));
            document.querySelectorAll('.tab-content').forEach((c, i) => c.classList.toggle('active', i === n));

            // Lazy-load the UMAP iframe on first open
            if (n === 2 && !umapLoaded) {
                umapLoaded = true;
                // Resolve relative to wherever index.html is served from (works on GitHub Pages subpaths)
                const base = window.location.href.replace(/\/[^/]*$/, '');
                document.getElementById('umap-frame').src = base + '/umap-converter.html';
            }
        }

        // ==================== ASSET DIFF TOOL ====================
        function canonicalizeAsset(raw) {
            if (!raw) return raw;
            let s = raw.replace(/^['"]+|['",\)\;]+$/g, "").trim();
            if (!s.includes(".")) return s;
            const firstDot = s.indexOf(".");
            const main = s.substring(0, firstDot);
            const rest = s.substring(firstDot + 1);
            if (/^\d+$/.test(rest)) return main;
            const secondClean = rest.split(".")[0].replace(/^Default__/, "").replace(/_C$/, "");
            return secondClean ? `${main}.${secondClean}` : main;
        }

        function findAllMatches(text) {
            return [...text.matchAll(/\/Game\/[^\s"']+/g)].map(m => canonicalizeAsset(m[0]));
        }

        document.getElementById("compareButton").addEventListener("click", () => {
            const before = document.getElementById("beforeBox").value;
            const after  = document.getElementById("afterBox").value;
            if (!before || !after) return alert("Please paste both Before and After text");
            const beforeSet = new Set(findAllMatches(before));
            const afterSet  = new Set(findAllMatches(after));
            const missing   = [...beforeSet].filter(x => !afterSet.has(x)).sort();
            document.getElementById("outputBox").value = missing.length ? missing.join("\n") : "No missing assets found.";
        });

        // ==================== COLLISION CONVERTER ====================
        document.getElementById("convertButton").addEventListener("click", () => {
            const file = document.getElementById("fileInput").files[0];
            if (!file) return alert("Please upload JSON file first.");
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const json = JSON.parse(e.target.result);
                    let convexOutput = "", boxOutput = "";
                    json.forEach(entry => {
                        const geom = entry.Properties?.AggGeom;
                        if (!geom) return;
                        if (geom.ConvexElems) {
                            const list = geom.ConvexElems.map(elem => {
                                const verts = elem.VertexData.map(v => `(X=${v.X},Y=${v.Y},Z=${v.Z})`).join(",");
                                return `(VertexData=(${verts}),IndexData=(${elem.IndexData.join(",")}),ElemBox=(Min=(X=${elem.ElemBox.Min.X},Y=${elem.ElemBox.Min.Y},Z=${elem.ElemBox.Min.Z}),Max=(X=${elem.ElemBox.Max.X},Y=${elem.ElemBox.Max.Y},Z=${elem.ElemBox.Max.Z}),IsValid=True))`;
                            });
                            convexOutput = `ConvexElems=(${list.join(",")})`;
                        }
                        if (geom.BoxElems) {
                            const list = geom.BoxElems.map(elem => {
                                const c = elem.Center, r = elem.Rotation;
                                return `(Center=(X=${c.X},Y=${c.Y},Z=${c.Z}),Rotation=(Pitch=${r.Pitch},Yaw=${r.Yaw},Roll=${r.Roll}),X=${elem.X},Y=${elem.Y},Z=${elem.Z})`;
                            });
                            boxOutput = `BoxElems=(${list.join(",")})`;
                        }
                    });
                    document.getElementById("collisionOutput").value =
                        `(${boxOutput || "BoxElems="},${convexOutput || "ConvexElems="})`;
                } catch(err) {
                    alert("Invalid JSON file");
                }
            };
            reader.readAsText(file);
        });

        document.getElementById("copyCollisionBtn").addEventListener("click", () => {
            const text = document.getElementById("collisionOutput").value;
            if (text) navigator.clipboard.writeText(text).then(() => alert("Copied!"));
        });

        function copyField(id) {
            const el = document.getElementById(id);
            if (el) navigator.clipboard.writeText(el.value).then(() => alert("Copied to clipboard!"));
        }
    </script>
</body>
</html>
