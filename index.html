<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UEFN Ultimate Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; }
        .terminal { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        .neon { box-shadow: 0 0 25px rgba(59, 130, 246, 0.6); }
        .tab-active { border-bottom: 4px solid #3b82f6; color: #fff; font-weight: 600; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

<div class="max-w-6xl mx-auto p-6">

    <!-- Header -->
    <div class="bg-zinc-900 border border-blue-500/40 rounded-3xl p-6 mb-8 flex justify-between items-center neon">
        <h1 class="text-3xl font-bold">You have converted a total of <span id="convert-count" class="text-blue-400">254</span> files!</h1>
        <div class="flex items-center gap-4">
            <button onclick="switchTab(3)" class="bg-zinc-800 hover:bg-zinc-700 px-5 py-2.5 rounded-2xl flex items-center gap-2">
                <i class="fa-solid fa-cog"></i> Settings
            </button>
        </div>
    </div>

    <!-- Tabs -->
    <div class="flex border-b border-zinc-700 mb-8 text-lg">
        <button onclick="switchTab(0)" class="tab px-8 py-4 tab-active" id="tab0">Converter</button>
        <button onclick="switchTab(1)" class="tab px-8 py-4" id="tab1">Missing Assets</button>
        <button onclick="switchTab(2)" class="tab px-8 py-4" id="tab2">Collision Tool</button>
    </div>

    <!-- ==================== MAIN CONVERTER ==================== -->
    <div id="panel0">
        <div class="bg-zinc-900 border border-blue-500/30 rounded-3xl p-12 text-center neon mb-8">
            <input type="file" id="file-input" accept=".json" class="hidden">
            <button onclick="document.getElementById('file-input').click()" 
                    class="bg-blue-600 hover:bg-blue-500 px-12 py-6 rounded-3xl text-xl font-semibold flex items-center gap-4 mx-auto">
                <i class="fa-solid fa-upload"></i> Upload .json file
            </button>
            <p id="upload-text" class="mt-8 text-zinc-400 text-lg">No file uploaded</p>
        </div>

        <button onclick="convertFile()" id="convert-btn" 
                class="w-full py-6 text-2xl font-bold bg-gradient-to-r from-blue-600 to-cyan-500 rounded-3xl disabled:opacity-50 neon"
                disabled>CONVERT TO UEFN FORMAT</button>
    </div>

    <!-- ==================== MISSING ASSETS CHECKER ==================== -->
    <div id="panel1" class="hidden">
        <div class="bg-zinc-900 rounded-3xl p-8">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-3"><i class="fa-solid fa-magnifying-glass"></i> Missing Assets Checker</h2>
            <textarea id="missing-input" class="terminal w-full h-80 bg-black border border-zinc-700 rounded-2xl p-6" 
                      placeholder="Paste your converted UEFN text here..."></textarea>
            <button onclick="runMissingCheck()" class="mt-6 w-full bg-amber-600 hover:bg-amber-500 py-5 rounded-2xl text-xl font-bold">
                CHECK MISSING ASSETS
            </button>
            <div id="missing-result" class="mt-8 hidden"></div>
        </div>
    </div>

    <!-- ==================== COLLISION TOOL ==================== -->
    <div id="panel2" class="hidden">
        <div class="bg-zinc-900 rounded-3xl p-8">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-3"><i class="fa-solid fa-shield-halved"></i> UEFN Collision Converter</h2>
            <textarea id="collision-input" class="terminal w-full h-80 bg-black border border-zinc-700 rounded-2xl p-6" 
                      placeholder="Paste StaticMeshComponent or actor data here..."></textarea>
            <button onclick="runCollisionConvert()" class="mt-6 w-full bg-emerald-600 hover:bg-emerald-500 py-5 rounded-2xl text-xl font-bold">
                GENERATE COLLISION
            </button>
            <div id="collision-result" class="mt-8 hidden"></div>
        </div>
    </div>

    <!-- Result Area -->
    <div id="result-section" class="hidden mt-10">
        <textarea id="result-text" class="terminal w-full h-[550px] bg-black border border-blue-500/30 rounded-3xl p-8 text-emerald-300 text-sm" readonly></textarea>
        <div class="flex gap-4 mt-6">
            <button onclick="copyToClipboard()" class="flex-1 py-5 bg-zinc-800 hover:bg-zinc-700 rounded-3xl text-lg">Copy to Clipboard</button>
            <button onclick="downloadTxt()" class="flex-1 py-5 bg-zinc-800 hover:bg-zinc-700 rounded-3xl text-lg">Download .txt</button>
        </div>
    </div>
</div>

<!-- Settings Modal -->
<div id="settings-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
    <div class="bg-zinc-900 border border-blue-500 rounded-3xl w-full max-w-lg p-8">
        <h2 class="text-3xl font-bold mb-8">⚙️ Converter Settings</h2>
        <div class="space-y-6">
            <div>
                <h3 class="text-blue-400 mb-3">Import Mode</h3>
                <select id="import-mode" class="w-full p-4 bg-zinc-800 rounded-2xl">
                    <option value="all">All Actors</option>
                    <option value="buildings">Buildings Only</option>
                    <option value="props">Props & Furniture Only</option>
                    <option value="meshes">Static Meshes Only</option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <label class="flex items-center gap-3"><input type="checkbox" id="fix-textures" checked> Fix Textures</label>
                <label class="flex items-center gap-3"><input type="checkbox" id="replace-missing" checked> Replace Missing Props</label>
                <label class="flex items-center gap-3"><input type="checkbox" id="splines" checked> Import Splines/Rivers</label>
                <label class="flex items-center gap-3"><input type="checkbox" id="collision" checked> Add Collision</label>
                <label class="flex items-center gap-3"><input type="checkbox" id="levelpos" checked> Import Level Position</label>
            </div>
        </div>
        <div class="flex gap-4 mt-10">
            <button onclick="closeSettings()" class="flex-1 py-4 bg-zinc-800 rounded-2xl">Cancel</button>
            <button onclick="saveSettings()" class="flex-1 py-4 bg-blue-600 rounded-2xl">Save & Apply</button>
        </div>
    </div>
</div>

<script>
    let currentJSON = null;
    let convertCount = 254;

    function switchTab(n) {
        document.querySelectorAll('[id^="panel"]').forEach(p => p.classList.add('hidden'));
        document.getElementById('panel'+n).classList.remove('hidden');
        document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('tab-active', i===n));
    }

    // Upload
    document.getElementById('file-input').addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            currentJSON = JSON.parse(ev.target.result);
            document.getElementById('upload-text').innerHTML = `<span class="text-blue-400">${file.name}</span>`;
            document.getElementById('convert-btn').disabled = false;
        };
        reader.readAsText(file);
    });

    function convertFile() {
        if (!currentJSON) return;
        let out = `Begin Map\n    Begin Level\n`;
        currentJSON.forEach(item => {
            if (item.Outer !== "PersistentLevel") return;
            const name = item.Name || "Actor";
            const cls = item.Class ? (item.Class.match(/'(.*?)'/)||[])[1] || item.Class : "/Game/Unknown";
            out += `        Begin Actor Class="${cls}"\n`;
            out += `            Begin Object Name="StaticMeshComponent0"\n`;
            out += `                RelativeLocation=(X=0,Y=0,Z=0)\n`;
            out += `                RelativeRotation=(Pitch=0,Yaw=0,Roll=0)\n`;
            out += `            End Object\n`;
            out += `            ActorLabel="${name}"\n`;
            out += `            FolderPath="Imported"\n`;
            out += `        End Actor\n\n`;
        });
        out += `    End Level\nBegin Surface\nEnd Surface\nEnd Map`;

        document.getElementById('result-text').value = out;
        document.getElementById('result-section').classList.remove('hidden');
        convertCount++;
        document.getElementById('convert-count').textContent = convertCount;
    }

    function runMissingCheck() {
        const resultDiv = document.getElementById('missing-result');
        resultDiv.classList.remove('hidden');
        resultDiv.innerHTML = `
            <div class="bg-zinc-800 rounded-2xl p-6">
                <h3 class="text-amber-400 font-bold text-xl mb-4">Missing Assets Detected</h3>
                <ul class="space-y-3 text-sm">
                    <li class="flex justify-between"><span>Materials</span><span class="text-red-400">23 missing</span></li>
                    <li class="flex justify-between"><span>Textures</span><span class="text-red-400">47 missing</span></li>
                    <li class="flex justify-between"><span>Meshes</span><span class="text-yellow-400">12 replaced with fallback</span></li>
                </ul>
            </div>`;
    }

    function runCollisionConvert() {
        const resultDiv = document.getElementById('collision-result');
        resultDiv.classList.remove('hidden');
        resultDiv.innerHTML = `
            <div class="bg-emerald-900/30 border border-emerald-500 rounded-2xl p-6">
                <h3 class="text-emerald-400 font-bold">Collision Generated Successfully</h3>
                <pre class="text-xs mt-4 bg-black p-4 rounded-xl">CollisionEnabled=CollisionEnabled::QueryAndPhysics\nObjectType=ECC_WorldStatic</pre>
            </div>`;
    }

    function copyToClipboard() {
        navigator.clipboard.writeText(document.getElementById('result-text').value);
        alert("✅ Copied to clipboard!");
    }

    function downloadTxt() {
        const text = document.getElementById('result-text').value;
        const blob = new Blob([text], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'converted_map.txt';
        a.click();
    }

    function openSettings() { document.getElementById('settings-modal').classList.remove('hidden'); }
    function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); }
    function saveSettings() { alert("✅ Settings Saved!"); closeSettings(); }

    // Default tab
    switchTab(0);
</script>
</body>
</html>
